# compiler-templates/icpx.toml
# Intel oneAPI DPC++ compiler — used for SYCL heterogeneous compute.
# -fsycl is always applied; host code is standard C++.

[compiler]
name          = "icpx"
binary        = "icpx"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[compiler.extensions]
handles = [".cpp", ".cc", ".cxx", ".c++", ".sycl"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Oz"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra"
warnings.error   = "-Wall -Wextra -Werror"
lto.true         = "-flto"
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = "-fsanitize={values}"

[compiler.standards]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++23" = "-std=c++23"

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MF {path}"

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""

[compiler.extra]
always = ["-fsycl"]
