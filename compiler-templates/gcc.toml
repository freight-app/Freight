name          = "gcc"
binary        = "g++"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[extensions]
handles = [".cpp", ".cppm", ".cc", ".cxx", ".c++", ".c"]

[flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Oz"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra -Wpedantic"
warnings.error   = "-Wall -Wextra -Wpedantic -Werror"
lto.true         = "-flto"
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = "-fsanitize={values}"

[standards]
"c11"   = "-std=c11"
"c17"   = "-std=c17"
"c23"   = "-std=c23"
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"
"c++23" = "-std=c++23"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MMD -MF {path}"

[modules]
supported     = true
enable_flag   = "-fmodules-ts"
compile_miu   = "-fmodule-output={pcm_path}"
import_module = "-fmodule-file={name}={pcm_path}"

[passthrough]
enabled = false
prefix  = ""

[linking.c]
abi            = "c"
compile_binary = "gcc"
compatible     = ["fortran"]
linker         = ""
extensions     = [".c"]

[linking.cpp]
abi        = "c++"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".cpp", ".cppm", ".cc", ".cxx", ".c++"]
