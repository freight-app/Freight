name          = "nvcc"
binary        = "nvcc"
version_arg   = "--version"
version_regex = "release (\\d+\\.\\d+)"

[extensions]
handles = [".cu", ".cuh"]

[flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-O2"
opt.z            = "-O2"
debug.true       = "-g -G"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra"
warnings.error   = "-Wall -Wextra -Werror"
lto.true         = ""
lto.false        = ""
sanitize         = ""

[standards]
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""

[modules]
supported = false

[passthrough]
enabled = true
prefix  = "-Xcompiler"

[extra]
always = ["--expt-relaxed-constexpr", "--extended-lambda"]

[linking.cuda]
abi        = "cuda"
compatible = ["c++", "c", "fortran"]
linker     = "c++"
extensions = [".cu", ".cuh"]
