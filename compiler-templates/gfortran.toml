[compiler]
name          = "gfortran"
binary        = "gfortran"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[compiler.extensions]
handles = [".f90", ".f95", ".f03", ".f08", ".f", ".F90"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Os"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra -Wpedantic"
warnings.error   = "-Wall -Wextra -Wpedantic -Werror"
lto.true         = "-flto"
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = "-fsanitize={values}"

[compiler.standards]
"f95"    = "-std=f95"
"f2003"  = "-std=f2003"
"f2008"  = "-std=f2008"
"f2018"  = "-std=f2018"

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""
