# compiler-templates/opencl.toml
# Compiles OpenCL C kernel files (.cl) using clang in OpenCL mode.
# Host code (C or C++) is compiled separately by the gcc/clang template.

[compiler]
name          = "opencl"
binary        = "clang"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[compiler.extensions]
handles = [".cl"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Oz"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra"
warnings.error   = "-Wall -Wextra -Werror"
lto.true         = ""
lto.false        = ""
strip.true       = ""
strip.false      = ""
sanitize         = ""

[compiler.standards]
"CL1.0" = "-cl-std=CL1.0"
"CL1.1" = "-cl-std=CL1.1"
"CL1.2" = "-cl-std=CL1.2"
"CL2.0" = "-cl-std=CL2.0"
"CL3.0" = "-cl-std=CL3.0"

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = "-MF {path}"

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""

[compiler.extra]
always = ["-x", "cl"]
