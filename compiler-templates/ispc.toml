# compiler-templates/ispc.toml
# Intel SPMD Program Compiler — vectorising compiler for CPU SIMD.
# Outputs a .o object file + a C header. The host links the .o from C or C++.

[compiler]
name          = "ispc"
binary        = "ispc"
version_arg   = "--version"
version_regex = "(\\d+\\.\\d+\\.\\d+)"

[compiler.extensions]
handles = [".ispc"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-O2"
opt.z            = "-O2"
debug.true       = "-g"
debug.false      = ""
warnings.none    = "--woff"
warnings.default = ""
warnings.all     = ""
warnings.error   = "--werror"
lto.true         = ""
lto.false        = ""
strip.true       = ""
strip.false      = ""
sanitize         = ""

[compiler.standards]
# ISPC does not use language-level standard flags

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = ""
dep_file     = "-MMM {path}"

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""
