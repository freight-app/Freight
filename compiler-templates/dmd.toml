# D reference compiler (DMD). Flag conventions also work with LDC/GDC.
# D has no -std= flag; language version tracks the compiler version.

name          = "dmd"
binary        = "dmd"
version_arg   = "--version"
version_regex = "v(\\d+\\.\\d+\\.\\d+)"

[extensions]
handles = [".d"]

[flags]
opt.0            = ""
opt.1            = "-O"
opt.2            = "-O"
opt.3            = "-O -release"
opt.s            = "-O"
opt.z            = "-O"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-wi"
warnings.all     = "-w"
warnings.error   = "-w"
lto.true         = ""
lto.false        = ""
strip.true       = "-L-s"
strip.false      = ""
sanitize         = ""

[standards]
# D has no -std= flag; any std value in crane.toml is documentation only

[structure]
include_dir  = "-I{path}"
define       = "-version={name}"
define_value = "-version={name}"
output       = "-of={path}"
compile_only = "-c"
dep_file     = ""
target       = ""
sysroot      = ""

[modules]
supported = false

[passthrough]
enabled = false
prefix  = ""

[linking.d]
abi        = "d"
compatible = ["c", "fortran"]
linker     = ""
extensions = [".d"]
