# compiler-templates/hipcc.toml
# AMD ROCm HIP compiler — AMD's CUDA equivalent.
# Handles .hip files and plain .cpp files when the hip backend is selected.

[compiler]
name          = "hipcc"
binary        = "hipcc"
version_arg   = "--version"
version_regex = "HIP version: (\\d+\\.\\d+\\.\\d+)"

[compiler.extensions]
handles = [".hip", ".cpp", ".cc", ".cxx"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Oz"
debug.true       = "-g -ggdb"
debug.false      = ""
warnings.none    = ""
warnings.default = "-Wall"
warnings.all     = "-Wall -Wextra"
warnings.error   = "-Wall -Wextra -Werror"
lto.true         = ""
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = ""

[compiler.standards]
"c++14" = "-std=c++14"
"c++17" = "-std=c++17"
"c++20" = "-std=c++20"

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""
