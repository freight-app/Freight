[compiler]
name          = "gnat"
binary        = "gnatmake"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[compiler.extensions]
handles = [".adb", ".ads"]

[compiler.flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Os"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-gnatwa"
warnings.all     = "-gnatwa -gnatwl"
warnings.error   = "-gnatwa -gnatwl -gnatwe"
lto.true         = ""
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = ""

[compiler.standards]
"ada2005" = "-gnat05"
"ada2012" = "-gnat12"
"ada2022" = "-gnat22"

[compiler.structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""

[compiler.modules]
supported = false

[compiler.passthrough]
enabled = false
prefix  = ""
