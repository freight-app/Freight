[workspace]
members = [
    "crates/crane",
    "crates/crane-core",
]
resolver = "2"

[workspace.dependencies]
# CLI
clap          = { version = "4", features = ["derive"] }
owo-colors    = "4"
indicatif     = "0.17"

# Manifest
toml_edit     = "0.22"
serde         = { version = "1", features = ["derive"] }
serde_json    = "1"

# Build engine
rayon         = "1"
walkdir       = "2"
regex         = "1"
sha2          = "0.10"

# Dependency resolution
semver        = "1"

# Error handling
anyhow        = "1"
thiserror     = "2"
