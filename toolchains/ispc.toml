# Intel SPMD Program Compiler — vectorising compiler for CPU SIMD.
# Outputs a .o object file + a C header. The host links the .o from C or C++.

name          = "ispc"
binary        = "ispc"
version_arg   = "--version"
version_regex = "(\\d+\\.\\d+\\.\\d+)"

[extensions]
handles = [".ispc"]

[flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-O2"
opt.z            = "-O2"
debug.true       = "-g"
debug.false      = ""
warnings.none    = "--woff"
warnings.default = ""
warnings.all     = ""
warnings.error   = "--werror"
lto.true         = ""
lto.false        = ""
strip.true       = ""
strip.false      = ""
sanitize         = ""

[standards]
# ISPC does not use language-level standard flags

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = ""
dep_file     = "-MMM {path}"
# ispc's --target selects SIMD width, not a host triple; cross-compilation
# is not supported via standard flags.
target       = ""
sysroot      = ""

[modules]
supported = false

[passthrough]
enabled = false
prefix  = ""

[linking.ispc]
abi        = "ispc"
compatible = ["c++", "c"]
linker     = ""
extensions = [".ispc"]
