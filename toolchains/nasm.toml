name          = "nasm"
binary        = "nasm"
version_arg   = "--version"
version_regex = "NASM version (\\d+\\.\\d+\\.\\d+)"

[extensions]
handles = [".asm", ".nasm"]

[flags]
# NASM does not use optimisation, warning, LTO or sanitizer flags.
opt.0            = ""
opt.1            = ""
opt.2            = ""
opt.3            = ""
opt.s            = ""
opt.z            = ""
debug.true       = "-g -F dwarf"
debug.false      = ""
warnings.none    = ""
warnings.default = ""
warnings.all     = "-w+all"
warnings.error   = "-w+all -Werror"
lto.true         = ""
lto.false        = ""
strip.true       = ""
strip.false      = ""
sanitize         = ""
# NASM does not use -m style CPU extension flags.
cpu_extension    = ""

[standards]
# NASM has no language standards table.

# Output format is arch + OS dependent.  crane picks the most-specific key:
#   "<arch>.<os>" first, then "<arch>".
# Arch values match std::env::consts::ARCH output.
[arch_flags]
"x86_64.linux"   = "-f elf64"
"x86_64.macos"   = "-f macho64"
"x86_64.windows" = "-f win64"
"x86.linux"      = "-f elf32"
"x86.macos"      = "-f macho32"
"x86.windows"    = "-f win32"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
# NASM always produces an object file; there is no separate link step invoked
# directly from nasm, so compile_only is intentionally empty.
compile_only = ""
# NASM does not generate Makefile dependency files.
dep_file     = ""
target       = ""
sysroot      = ""

[modules]
supported   = false
enable_flag = ""

[passthrough]
enabled = false
prefix  = ""

[linking.asm]
abi        = "c"
compatible = ["c", "cpp"]
linker     = ""
extensions = [".asm", ".nasm"]
