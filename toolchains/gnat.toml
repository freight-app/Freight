name          = "gnat"
binary        = "gnatmake"
version_arg   = "--version"
version_regex = "\\b(\\d+\\.\\d+\\.\\d+)\\b"

[extensions]
handles = [".adb", ".ads"]

[flags]
opt.0            = "-O0"
opt.1            = "-O1"
opt.2            = "-O2"
opt.3            = "-O3"
opt.s            = "-Os"
opt.z            = "-Os"
debug.true       = "-g"
debug.false      = ""
warnings.none    = ""
warnings.default = "-gnatwa"
warnings.all     = "-gnatwa -gnatwl"
warnings.error   = "-gnatwa -gnatwl -gnatwe"
lto.true         = ""
lto.false        = ""
strip.true       = "-s"
strip.false      = ""
sanitize         = ""

[standards]
"ada2005" = "-gnat05"
"ada2012" = "-gnat12"
"ada2022" = "-gnat22"

[structure]
include_dir  = "-I{path}"
define       = "-D{name}"
define_value = "-D{name}={value}"
output       = "-o {path}"
compile_only = "-c"
dep_file     = ""
target       = ""
sysroot      = ""

[modules]
supported = false

[passthrough]
enabled = false
prefix  = ""

[linking.ada]
abi        = "ada"
compatible = ["c"]
linker     = ""
extensions = [".adb", ".ads"]
