name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install language toolchains
      run: sudo apt-get update && sudo apt-get install -y gfortran nasm clang gcc
    - name: Build
      run: cargo build --locked --verbose
