name: Release

# Build the `freight` binary for each platform and attach it to the GitHub
# release when a version tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, name: linux-x86_64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,     name: macos-aarch64 }
          - { os: macos-13,       target: x86_64-apple-darwin,      name: macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   name: windows-x86_64 }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --bin freight --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="freight-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir "$staging"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/freight.exe" "$staging/"
          else
            cp "target/${{ matrix.target }}/release/freight" "$staging/"
          fi
          cp README.md LICENSE CHANGELOG.md "$staging/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$staging.zip" "$staging" >/dev/null
            echo "ASSET=$staging.zip" >> "$GITHUB_ENV"
          else
            tar czf "$staging.tar.gz" "$staging"
            echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
