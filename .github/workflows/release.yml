name: Release

# On a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`): build the
# `freight` binary for each platform, then collect them into a single GitHub
# release. The release is created as a *draft* — review the attached binaries,
# then publish it. (Publishing makes a release immutable, so all assets must be
# attached in one shot beforehand; that's why building and releasing are split.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, name: linux-x86_64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,     name: macos-aarch64 }
          # Cross-compile the Intel-mac binary on the arm64 runner — dedicated
          # macos-13 (Intel) runners are scarce and the job timed out waiting.
          - { os: macos-latest,   target: x86_64-apple-darwin,      name: macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   name: windows-x86_64 }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --bin freight --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="freight-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir "$staging"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/freight.exe" "$staging/"
          else
            cp "target/${{ matrix.target }}/release/freight" "$staging/"
          fi
          cp README.md LICENSE CHANGELOG.md "$staging/" 2>/dev/null || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$staging.zip" "$staging" >/dev/null
            echo "ASSET=$staging.zip" >> "$GITHUB_ENV"
          else
            tar czf "$staging.tar.gz" "$staging"
            echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: create draft release
    needs: build
    # Run as long as the workflow wasn't cancelled, so one flaky platform doesn't
    # block the draft — it's a draft, so you review the attached binaries before
    # publishing anyway.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release with all binaries
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
