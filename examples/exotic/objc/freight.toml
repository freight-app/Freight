[package]
name        = "objc-hello"
version     = "0.1.0"
description = "Objective-C binary using clang and the macOS Foundation framework"

[[bin]]
name = "objc-hello"
src  = "src/main.m"

[os.macos]
features = ["Foundation"]   # -framework Foundation

[compiler]
backend  = "clang"
warnings = "all"

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
strip     = true
debug     = false
