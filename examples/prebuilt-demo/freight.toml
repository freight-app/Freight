[package]
name        = "prebuilt-demo"
version     = "1.0.0"
description = "Demonstrates build.freight — the pre-build script"

# No external tools required.
# Optional: zlib on PATH improves output (probed via pkg-config at build time).

[language.c]
std = "c11"

[[bin]]
name = "prebuilt-demo"
src  = "src/main.c"

[compiler]
backend  = "auto"
warnings = "all"

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 2
debug     = false
