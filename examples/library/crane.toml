# crane.toml — static library example
# A C++20 math/linear-algebra library that other projects can depend on.

[package]
name        = "mathlib"
version     = "0.4.2"
authors     = ["Ada Lovelace <ada@example.com>"]
description = "Fast SIMD linear algebra for games and simulations"
license     = "MIT"
repository  = "https://github.com/example/mathlib"
keywords    = ["math", "simd", "linear-algebra"]

[language.cpp]
std = "c++20"

[lib]
type    = "static"      # static | shared | header-only
src     = "src/"
include = "include/"    # exposed to dependents

[dependencies]
# System library resolved via pkg-config
libblas = { system = "blas", version = ">=3.10" }

[dev-dependencies]
# Only used when running `crane test`
libcheck = "0.15"

[compiler]
backend   = "auto"
opt-level = 2
debug     = false
warnings  = "all"
defines   = ["MATHLIB_EXPORTS", "USE_SIMD"]

[compiler.includes]
paths = ["include/", "third_party/include/"]

[profile.dev]
opt-level = 0
debug     = true
sanitize  = ["address", "undefined"]

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false

[features]
default = ["simd"]
simd    = []
blas    = ["dep:libblas"]
full    = ["simd", "blas"]
