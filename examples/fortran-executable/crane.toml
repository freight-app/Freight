# crane.toml — Fortran executable example
# A numerical simulation program. Only links Fortran libraries.
# Note: Fortran projects cannot directly link C++ libraries. Calling C is possible
# via iso_c_binding interfaces, but requires explicit declarations — not automatic.

[package]
name        = "numerics"
version     = "0.1.0"
authors     = ["Grace Hopper <grace@example.com>"]
description = "Numerical simulation using BLAS and LAPACK"
license     = "MIT"

[language.fortran]
std = "f2018"

[[bin]]
name = "numerics"
src  = "src/main.f90"

[dependencies]
# System Fortran libraries resolved via pkg-config
libblas   = { system = "blas",   version = ">=3.10" }
liblapack = { system = "lapack", version = ">=3.10" }

[compiler]
backend   = "auto"   # auto-selects gfortran based on .f90 extension
opt-level = 2
warnings  = "all"

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
