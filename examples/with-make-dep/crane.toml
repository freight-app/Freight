[package]
name        = "with-make-dep"
version     = "0.1.0"
description = "Linking a local Makefile library as a path dependency"

[language.c]
std = "c17"

[[bin]]
name = "with-make-dep"
src  = "src/main.c"

# crane runs `make` in vendor/strutil, then finds libstrutil.a there.
# include/ is auto-detected.
[dependencies]
strutil = { path = "vendor/strutil", build_system = "make" }
