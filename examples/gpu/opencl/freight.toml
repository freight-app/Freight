[package]
name        = "opencl-hello"
version     = "0.1.0"
description = "OpenCL vector-addition kernels — requires an OpenCL-capable device"

[language.cpp]
std = "c++17"

[[bin]]
name = "opencl-hello"
src  = "src/main.cpp"

# OpenCL ICD loader — resolved from the system (pkg-config, returns -lOpenCL)
# when installed, or downloaded from the registry otherwise. The loader
# dispatches at run-time to whatever platform is installed (NVIDIA, Intel, AMD,
# POCL, …). A concrete version is required (freight forbids a bare `*`).
[dependencies]
OpenCL = "1.0"

[profile.debug]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
strip     = true
