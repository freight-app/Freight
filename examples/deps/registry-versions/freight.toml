[package]
name        = "with-registry-versions"
version     = "0.1.0"
description = "Example: version constraints and registry pinning"

[language.c]
std = "c11"

[[bin]]
name = "with-registry-versions"
src  = "src/main.c"

[dependencies]
# Exact version — freight fetches exactly this release.
zlib = "1.3.1"

# Minimum version constraint — freight picks the oldest available version
# that satisfies the bound, keeping builds reproducible.
sqlite3 = ">=3.34.1"

# Pin to a specific registry with `repo`.  Useful when you run multiple
# registries (local mirror + freight.dev) and want to avoid ambiguity.
fmt = { version = "10.2.0", repo = "local" }

[profile.dev]
opt-level = 0
debug     = true
