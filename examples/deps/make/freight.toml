[package]
name        = "with-make-dep"
version     = "0.1.0"
description = "Building a local Makefile library via the make build-system plugin"

[language.c]
std = "c17"

[[bin]]
name = "with-make-dep"
src  = "src/main.c"

# `strutil` is `external = true`: the `make` build-system plugin handles the
# `[make]` section below — it runs `make` in PKGS["strutil"].dir, exposes the
# include/ dir, and links the libstrutil.a the build produces in-tree.
[dependencies]
make-builder = { path = "../../../plugins/make" }
strutil      = { path = "vendor/strutil", external = true }

[make]
build = "strutil"
