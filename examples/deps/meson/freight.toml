[package]
name        = "with-meson-dep"
version     = "0.1.0"
description = "Building a local Meson library via the meson build-system plugin"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-meson-dep"
src  = "src/main.cpp"

# `mathlib` is `external = true`: the `meson` build-system plugin handles the
# `[meson]` section below — it runs meson setup/compile/install in
# PKGS["mathlib"].dir and links the result. Requires meson + ninja.
[dependencies]
meson-builder = { path = "../../../plugins/meson" }
mathlib       = { path = "vendor/mathlib", external = true }

[meson]
build = "mathlib"
