[package]
name        = "with-cmake-dep"
version     = "0.1.0"
description = "Building a local CMake library via the cmake build-system plugin"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-cmake-dep"
src  = "src/main.cpp"

# `mathlib` is marked `external = true`: freight does not build it itself. The
# `cmake` build-system plugin handles the `[cmake]` section below — it reads
# PKGS["mathlib"].dir, runs cmake configure/build/install, and links the result.
[dependencies]
cmake = { path = "../../../plugins/cmake" }
mathlib       = { path = "vendor/mathlib", external = true }

[cmake]
build = "mathlib"
