[package]
name        = "with-registry-dep"
version     = "0.1.0"
description = "Example: pulling dependencies from a freight registry"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-registry-dep"
src  = "src/main.cpp"

# Registry deps — freight looks up each name in the configured registries
# (in order) and fetches the matching version.  Run `freight fetch` first.
[dependencies]
fmt  = "10.2.0"
zlib = "1.3.1"

[profile.debug]
opt-level = 0
debug     = true
