[package]
name        = "with-external-deps"
version     = "0.1.0"
description = "Example: url, git, and system+pkg-config dependencies"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-external-deps"
src  = "src/main.cpp"

[dependencies]
# URL archive dep — any scheme curl supports: https://, http://, ftp://, …
# Header-only: freight detects no source files after fetching, skips building.
# sha256 is optional but recommended to pin the exact archive.
# Run `freight fetch` to download before `freight build`.
json    = { url = "https://github.com/nlohmann/json/archive/refs/tags/v3.11.3.tar.gz", include = ["single_include"] }
cxxopts = { url = "https://github.com/jarro2783/cxxopts/archive/refs/tags/v3.2.1.tar.gz", include = ["include"] }

# System-installed library: a bare version constraint resolves through the chain
# pkg-config → system-lib stub → registry. pkg-config (`pkg-config --cflags --libs
# zlib`) discovers include dirs and exact linker flags automatically when present;
# otherwise the bundled `z` stub supplies `-lz`.
zlib = "1.2"

[profile.debug]
opt-level = 0
debug     = true
