[package]
name        = "with-git-dep"
version     = "0.1.0"
description = "Using easyloggingpp via a git + cmake dependency"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-git-dep"
src  = "src/main.cpp"

# Run `freight fetch` first to clone the repo into .deps/easyloggingpp/.
# freight auto-detects CMakeLists.txt and builds the static lib.
# The library's public header lives under src/ in the repo, so we declare
# that explicitly (there is no include/ directory to auto-detect).
[dependencies]
easyloggingpp = { url = "https://github.com/amrayn/easyloggingpp.git", include = ["src/"], defines = ["CMAKE_POLICY_VERSION_MINIMUM=3.5", "build_static_lib=ON"] }
