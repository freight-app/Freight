[package]
name        = "tri-lang"
version     = "0.1.0"
description = "N-body gravity kernel — Fortran inner loop, C timer, C++ orchestration"

[language.cpp]
std = "c++20"

[language.c]
std = "c17"

[[bin]]
name = "tri-lang"
src  = "src/main.cpp"

# g++ drives the final link step (cpp > fortran in linker priority).
# The Fortran runtime must be linked explicitly when not using gfortran as the linker.
[os.unix]
features = ["gfortran"]

[compiler]
backend  = "auto"
warnings = "all"

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
