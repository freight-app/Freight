[package]
name        = "with-cmake-dep"
version     = "0.1.0"
description = "Linking a local CMake library as a path dependency"

[language.cpp]
std = "c++17"

[[bin]]
name = "with-cmake-dep"
src  = "src/main.cpp"

# crane auto-detects CMakeLists.txt in vendor/mathlib, builds it, and links
# any .a/.so it finds in the build directory.  The include/ directory is
# auto-detected (no explicit include = [...] needed).
[dependencies]
mathlib = { path = "vendor/mathlib" }
