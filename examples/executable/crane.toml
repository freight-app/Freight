# crane.toml — executable example
# A CLI tool with two binaries built from the same source tree.

[package]
name        = "imgtools"
version     = "1.2.0"
authors     = ["Grace Hopper <grace@example.com>"]
description = "Image processing utilities"
license     = "Apache-2.0"

[language.cpp]
std = "c++20"

# Multiple binaries from the same project
[[bin]]
name = "imgtools"       # crane run → runs this one (first entry = default)
src  = "src/main.cpp"

[[bin]]
name = "img-batch"
src  = "src/batch_main.cpp"

[dependencies]
libpng  = { system = "libpng",  version = ">=1.6" }
libjpeg = { system = "libjpeg", version = ">=9.0" }

# Local path dependency (e.g. a sibling library in development)
mathlib = { path = "../mathlib" }

[compiler]
backend   = "auto"
opt-level = 2
warnings  = "all"
defines   = ["_FILE_OFFSET_BITS=64"]

[compiler.includes]
paths = ["include/"]

# Per-extension compiler override — .cu files use nvcc even in a C++ project
[compiler.overrides]
".cu" = "nvcc"

[profile.dev]
opt-level = 0
debug     = true
sanitize  = ["address"]

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
