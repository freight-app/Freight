[package]
name        = "platform-deps"
version     = "0.1.0"
description = "Per-OS dependencies and compiler settings via [os.*] and [arch.*] sections"

[language.c]
std = "c17"

[[bin]]
name = "platform-deps"
src  = "src/main.c"

[compiler]
warnings = "all"

# OS-conditional sections — merged at build time based on the host OS.
# Family aliases: unix (everything except windows), bsd (all BSDs).

[os.linux]
defines      = ["PLATFORM_LINUX"]
dependencies = { m = { system = "m" } }

[os.macos]
defines = ["PLATFORM_MACOS"]

[os.windows]
defines = ["PLATFORM_WINDOWS"]

[os.unix]
defines = ["PLATFORM_UNIX"]

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 2
debug     = false
