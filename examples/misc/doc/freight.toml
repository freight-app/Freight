[package]
name        = "doc-example"
version     = "0.1.0"
description = "Multi-language doc comment showcase for freight-doc"

[language.cpp]
std = "c++17"

[[bin]]
name = "doc-example"
src  = "src/main.cpp"

[dependencies]
mathlib = { path = "libs/mathlib" }
stats   = { path = "libs/stats" }

[dev-dependencies]
linalg  = { path = "libs/linalg" }
