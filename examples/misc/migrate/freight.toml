# freight.toml — generated by `freight migrate`
# Review the `# FREIGHT:` notes below before committing.

[package]
name        = "migrated-from-cmake"
version     = "0.1.0"

[language.cpp]
std = "c++20"

[[bin]]
name = "migrated-from-cmake"
src  = "src/main.cpp"

[dependencies]
unix = { features = ["pthread"] }

[compiler]
backend   = "auto"
opt-level = 2
debug     = false
warnings  = "all"
includes  = ["include/"]

[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
