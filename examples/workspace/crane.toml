# crane.toml — workspace root
# Marks this directory as the workspace root. No [package] section and no member list —
# members are independent crates that reference each other via `path = "..."` deps.
# The root exists to anchor relative paths and share dependency versions and profiles.

[workspace]

# Shared dependency versions available to all members via `{ workspace = true }`.
# Members cannot override these versions, only opt in or out.
[workspace.dependencies]
libvulkan = { system = "vulkan", version = ">=1.3" }
libsdl2   = { system = "sdl2",   version = ">=2.0" }

# Workspace-level profile defaults — inherited by members, overridable per member.
[profile.dev]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
