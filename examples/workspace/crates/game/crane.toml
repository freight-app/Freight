# crates/game/crane.toml — workspace member (binary)

[package]
name        = "game"
version     = "0.1.0"
authors     = ["Dev Team"]
description = "Main game binary"
license     = "MIT"

[language.cpp]
std = "c++20"

[[bin]]
name = "game"
src  = "src/main.cpp"

[dependencies]
engine   = { path = "../engine" }
renderer = { path = "../renderer" }
libsdl2  = { workspace = true }

[compiler]
backend   = "auto"
opt-level = 2
warnings  = "all"

# Override profiles per-member — release build ships with debug info stripped
[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
