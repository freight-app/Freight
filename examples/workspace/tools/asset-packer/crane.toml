# tools/asset-packer/crane.toml — workspace member (standalone tool binary)

[package]
name        = "asset-packer"
version     = "0.1.0"
authors     = ["Dev Team"]
description = "Offline tool — packs raw assets into a binary bundle"
license     = "MIT"

[language.cpp]
std = "c++17"      # tool doesn't need C++20 modules

[[bin]]
name = "asset-packer"
src  = "src/main.cpp"

[dependencies]
engine = { path = "../../crates/engine" }   # reuses core math/types only

[compiler]
backend   = "auto"
opt-level = 2
warnings  = "all"
