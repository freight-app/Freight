[package]
name    = "cpp-modules"
version = "0.1.0"
description = "C++20 named modules — geometry library"

[language.cpp]
std = "c++20"

[[bin]]
name = "cpp-modules"
src  = "src/main.cpp"

[compiler]
backend  = "auto"
warnings = "all"

[profile.debug]
opt-level = 0
debug     = true

[profile.release]
opt-level = 3
lto       = true
strip     = true
debug     = false
